<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clay Garden Press</title>
<meta name="description" content="Field notes and deep dives. Coming soon.">
<link rel="canonical" href="https://claygardenpress.com">
<meta property="og:type" content="website">
<meta property="og:url" content="https://claygardenpress.com">
<meta property="og:site_name" content="Clay Garden Press">
<meta property="og:title" content="Clay Garden Press">
<meta property="og:description" content="Field notes and deep dives. Coming soon.">
<meta name="theme-color" content="#1a1810">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
    background: #f5f1e8;
    color: #1a1810;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    line-height: 1.5;
  }
  .mark {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: #b8682d;
    margin-bottom: 32px;
    position: relative;
  }
  .mark::after {
    content: '';
    position: absolute;
    inset: 14px;
    border-radius: 50%;
    border: 2px solid #f5f1e8;
  }
  h1 {
    font-size: clamp(40px, 7vw, 64px);
    font-weight: 400;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
    text-align: center;
  }
  .tag {
    font-style: italic;
    font-size: clamp(16px, 2vw, 20px);
    color: #5a4d3a;
    text-align: center;
    max-width: 480px;
  }
  .soon {
    margin-top: 56px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: #8a7a5e;
  }
</style>
</head>
<body>
  <div class="mark"></div>
  <h1>Clay Garden Press</h1>
  <p class="tag">Field notes and deep dives. From the bench, not the boardroom.</p>
  <p class="soon">Building · 2026</p>
</body>
</html>
